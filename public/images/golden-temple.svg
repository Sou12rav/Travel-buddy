<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Background -->
  <rect width="800" height="600" fill="#f9f9f9"/>
  
  <!-- Sky -->
  <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#1e88e5" />
    <stop offset="100%" stop-color="#64b5f6" />
  </linearGradient>
  <rect width="800" height="300" fill="url(#sky)"/>
  
  <!-- Water/Pool -->
  <rect x="150" y="300" width="500" height="250" fill="#039be5" opacity="0.8"/>
  
  <!-- Causeway -->
  <rect x="350" y="300" width="100" height="250" fill="#e0e0e0"/>
  
  <!-- Temple base -->
  <rect x="250" y="250" width="300" height="50" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="1"/>
  
  <!-- Temple main structure -->
  <rect x="300" y="150" width="200" height="100" fill="#ffeb3b" stroke="#fdd835" stroke-width="2"/>
  
  <!-- Golden dome -->
  <ellipse cx="400" cy="150" rx="100" ry="50" fill="#ffd600" stroke="#fbc02d" stroke-width="2"/>
  <path d="M400,100 L400,75" stroke="#fbc02d" stroke-width="3" fill="none"/>
  <circle cx="400" cy="75" r="10" fill="#ffd600" stroke="#fbc02d" stroke-width="1"/>
  
  <!-- Corner domes -->
  <ellipse cx="300" cy="175" rx="25" ry="15" fill="#ffd600" stroke="#fbc02d" stroke-width="1"/>
  <ellipse cx="500" cy="175" rx="25" ry="15" fill="#ffd600" stroke="#fbc02d" stroke-width="1"/>
  
  <!-- Decorative elements -->
  <rect x="325" y="200" width="150" height="20" fill="#ffffff" stroke="#bdbdbd" stroke-width="1"/>
  <rect x="350" y="175" width="100" height="15" fill="#ffffff" stroke="#bdbdbd" stroke-width="1"/>
  
  <!-- Doors -->
  <rect x="375" y="220" width="50" height="30" fill="#6d4c41" stroke="#5d4037" stroke-width="1"/>
  
  <!-- Reflection in water -->
  <rect x="300" y="300" width="200" height="100" fill="#ffeb3b" opacity="0.3"/>
  <ellipse cx="400" cy="300" rx="100" ry="25" fill="#ffd600" opacity="0.3"/>
  
  <!-- Pilgrims walking on the causeway -->
  <circle cx="380" cy="425" r="10" fill="#5d4037"/>
  <circle cx="420" cy="450" r="10" fill="#795548"/>
  <circle cx="400" cy="475" r="10" fill="#8d6e63"/>
  
  <!-- Birds -->
  <path d="M200,100 Q210,90 220,100 Q230,90 240,100" fill="none" stroke="#424242" stroke-width="1"/>
  <path d="M500,125 Q510,115 520,125 Q530,115 540,125" fill="none" stroke="#424242" stroke-width="1"/>
  
  <!-- Decorative Text -->
  <text x="400" y="550" text-anchor="middle" font-family="Arial" font-size="20" fill="#5d4037">Golden Temple, Amritsar</text>
</svg>