<?xml version="1.0" encoding="UTF-8"?>
<svg width="200px" height="200px" viewBox="0 0 200 200" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
    <g transform="translate(10, 10)">
      <!-- Water -->
      <rect x="10" y="110" width="160" height="70" fill="#a0d8ef"/>
      
      <!-- Temple platform -->
      <rect x="30" y="110" width="120" height="10" fill="#ddd"/>
      
      <!-- Main temple structure -->
      <rect x="50" y="70" width="80" height="40" fill="#ffd700"/>
      
      <!-- Dome -->
      <path d="M60,70 Q90,30 120,70 Z" fill="#ffd700"/>
      <ellipse cx="90" cy="35" rx="8" ry="4" fill="#ffd700"/>
      
      <!-- Temple details -->
      <rect x="55" y="80" width="70" height="3" fill="#e5c000"/>
      <rect x="55" y="90" width="70" height="3" fill="#e5c000"/>
      <rect x="55" y="100" width="70" height="3" fill="#e5c000"/>
      
      <!-- Entrance -->
      <rect x="80" y="90" width="20" height="20" fill="#e5c000"/>
      
      <!-- Pathway to temple -->
      <rect x="85" y="110" width="10" height="70" fill="#ddd"/>
      
      <!-- Reflection in water -->
      <rect x="50" y="120" width="80" height="40" fill="#ffd700" opacity="0.3"/>
      <path d="M60,160 Q90,130 120,160 Z" fill="#ffd700" opacity="0.3"/>
    </g>
  </g>
</svg>