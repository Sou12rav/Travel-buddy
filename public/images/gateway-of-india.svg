<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Background -->
  <rect width="800" height="600" fill="#f5f5f5"/>
  
  <!-- Sky -->
  <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#ff9800" />
    <stop offset="100%" stop-color="#ffeb3b" />
  </linearGradient>
  <rect width="800" height="300" fill="url(#sky)"/>
  
  <!-- Sea -->
  <linearGradient id="sea" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#0288d1" />
    <stop offset="100%" stop-color="#03a9f4" />
  </linearGradient>
  <rect x="0" y="300" width="800" height="300" fill="url(#sea)"/>
  
  <!-- Gateway base -->
  <rect x="200" y="200" width="400" height="200" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="2"/>
  
  <!-- Main arch -->
  <path d="M350,400 L350,250 A50,50 0 0,1 450,250 L450,400" fill="none" stroke="#9e9e9e" stroke-width="3"/>
  
  <!-- Main dome -->
  <ellipse cx="400" cy="200" rx="75" ry="50" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="2"/>
  <path d="M400,150 L400,120" stroke="#bdbdbd" stroke-width="2" fill="none"/>
  <circle cx="400" cy="120" r="5" fill="#bdbdbd"/>
  
  <!-- Side domes -->
  <ellipse cx="275" cy="225" rx="30" ry="20" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="2"/>
  <path d="M275,205 L275,195" stroke="#bdbdbd" stroke-width="2" fill="none"/>
  <circle cx="275" cy="195" r="3" fill="#bdbdbd"/>
  
  <ellipse cx="525" cy="225" rx="30" ry="20" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="2"/>
  <path d="M525,205 L525,195" stroke="#bdbdbd" stroke-width="2" fill="none"/>
  <circle cx="525" cy="195" r="3" fill="#bdbdbd"/>
  
  <!-- Side arches -->
  <path d="M250,400 L250,300 A25,25 0 0,1 300,300 L300,400" fill="none" stroke="#9e9e9e" stroke-width="2"/>
  <path d="M500,400 L500,300 A25,25 0 0,1 550,300 L550,400" fill="none" stroke="#9e9e9e" stroke-width="2"/>
  
  <!-- Windows -->
  <rect x="250" y="250" width="25" height="40" fill="#90caf9" stroke="#bdbdbd" stroke-width="1"/>
  <rect x="525" y="250" width="25" height="40" fill="#90caf9" stroke="#bdbdbd" stroke-width="1"/>
  
  <!-- Reflection in water -->
  <rect x="200" y="400" width="400" height="100" fill="#e0e0e0" opacity="0.3"/>
  <ellipse cx="400" cy="400" rx="75" ry="25" fill="#e0e0e0" opacity="0.3"/>
  
  <!-- Boats -->
  <path d="M150,450 Q175,425 200,450 L225,450 Q200,475 150,450 Z" fill="#8d6e63"/>
  <path d="M600,475 Q625,450 650,475 L675,475 Q650,500 600,475 Z" fill="#a1887f"/>
  
  <!-- Decorative Text -->
  <text x="400" y="550" text-anchor="middle" font-family="Arial" font-size="20" fill="#3e2723">Gateway of India, Mumbai</text>
</svg>