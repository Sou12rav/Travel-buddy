  <circle cx="500" y="530" r="8" fill="#000"/>
  <rect x="498" y="538" width="4" height="15" fill="#000"/>
  <rect x="493" y="546" width="15" height="3" fill="#000"/>
  <rect x="498" y="553" width="4" height="10" fill="#000"/>
  
