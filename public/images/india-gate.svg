<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky background -->
  <rect width="800" height="600" fill="#87CEEB"/>
  
  <!-- Ground -->
  <rect x="0" y="450" width="800" height="150" fill="#8B4513"/>
  
  <!-- Path leading to India Gate -->
  <path d="M300 600 L400 450 L500 600" fill="#D2B48C"/>
  
  <!-- India Gate structure - main arch -->
  <rect x="250" y="150" width="300" height="300" fill="#F5DEB3"/>
  
  <!-- Arch cutout -->
  <path d="M300 450 Q400 300 500 450" fill="#87CEEB" stroke="#F5DEB3" stroke-width="2"/>
  
  <!-- Top decoration -->
  <rect x="230" y="150" width="340" height="30" fill="#DEB887"/>
  <rect x="220" y="120" width="360" height="30" fill="#DEB887"/>
  
  <!-- Small windows/details -->
  <rect x="280" y="200" width="30" height="50" fill="#8B4513"/>
  <rect x="490" y="200" width="30" height="50" fill="#8B4513"/>
  <rect x="280" y="280" width="30" height="50" fill="#8B4513"/>
  <rect x="490" y="280" width="30" height="50" fill="#8B4513"/>
  
  <!-- Center flame (Amar Jawan Jyoti) -->
  <polygon points="390,400 400,360 410,400" fill="#FF4500" stroke="#000" stroke-width="1"/>
  <polygon points="395,400 400,370 405,400" fill="#FFD700" stroke="#000" stroke-width="0.5"/>
  
  <!-- Base structure -->
  <rect x="280" y="450" width="240" height="30" fill="#DEB887"/>
  
  <!-- Text - "INDIA GATE" -->
  <text x="335" y="100" font-family="Arial" font-size="24" font-weight="bold" fill="#000">INDIA GATE</text>
  
  <!-- Small flag at the top -->
  <rect x="400" y="90" width="2" height="30" fill="#000"/>
  <rect x="402" y="90" width="20" height="12" fill="#FF9933"/>
  <rect x="402" y="102" width="20" height="6" fill="#FFFFFF"/>
  <rect x="402" y="108" width="20" height="12" fill="#138808"/>
  <circle cx="412" cy="105" r="3" fill="#000080"/>
  
  <!-- People silhouettes near the monument -->
  <circle cx="350" y="500" r="10" fill="#000"/>
  <rect x="347" y="510" width="6" height="20" fill="#000"/>
  <rect x="340" y="520" width="20" height="4" fill="#000"/>
  <rect x="347" y="530" width="6" height="15" fill="#000"/>
  
  <circle cx="380" y="510" r="8" fill="#000"/>
  <rect x="378" y="518" width="4" height="15" fill="#000"/>
  <rect x="372" y="526" width="16" height="3" fill="#000"/>
  <rect x="378" y="533" width="4" height="12" fill="#000"/>
  
  <circle cx="450" y="505" r="9" fill="#000"/>
  <rect x="448" y="514" width="5" height="18" fill="#000"/>
  <rect x="442" y="523" width="18" height="4" fill="#000"/>
  <rect x="448" y="532" width="5" height="13" fill="#000"/>
</svg>