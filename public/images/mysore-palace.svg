<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Night sky background with gradient -->
  <rect width="800" height="600" fill="#191970"/>
  <radialGradient id="nightGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
    <stop offset="0%" stop-color="#483D8B" stop-opacity="0.7"/>
    <stop offset="100%" stop-color="#191970" stop-opacity="1"/>
  </radialGradient>
  <rect width="800" height="600" fill="url(#nightGlow)"/>
  
  <!-- Stars in the sky -->
  <circle cx="100" cy="80" r="1.5" fill="white"/>
  <circle cx="200" cy="50" r="1" fill="white"/>
  <circle cx="300" cy="90" r="1.2" fill="white"/>
  <circle cx="430" cy="70" r="1" fill="white"/>
  <circle cx="500" cy="40" r="1.5" fill="white"/>
  <circle cx="600" cy="85" r="1" fill="white"/>
  <circle cx="700" cy="60" r="1.2" fill="white"/>
  <circle cx="750" cy="120" r="1" fill="white"/>
  <circle cx="50" cy="150" r="1.3" fill="white"/>
  <circle cx="150" cy="130" r="1" fill="white"/>
  <circle cx="650" cy="140" r="1.2" fill="white"/>

  <!-- Ground -->
  <rect x="0" y="500" width="800" height="100" fill="#2E8B57"/>
  
  <!-- Mysore Palace - Main Structure -->
  <rect x="200" y="200" width="400" height="300" fill="#E6BE8A"/>
  
  <!-- Palace Base -->
  <rect x="180" y="480" width="440" height="20" fill="#CD853F"/>
  
  <!-- Central Dome -->
  <path d="M350,200 Q400,100 450,200" fill="#FFD700" stroke="#DAA520" stroke-width="3"/>
  
  <!-- Side Domes -->
  <path d="M250,200 Q280,140 310,200" fill="#FFD700" stroke="#DAA520" stroke-width="2"/>
  <path d="M490,200 Q520,140 550,200" fill="#FFD700" stroke="#DAA520" stroke-width="2"/>
  
  <!-- Palace Windows - First Floor -->
  <rect x="230" y="240" width="30" height="50" fill="#4682B4" stroke="#000" stroke-width="1"/>
  <rect x="290" y="240" width="30" height="50" fill="#4682B4" stroke="#000" stroke-width="1"/>
  <rect x="350" y="240" width="30" height="50" fill="#4682B4" stroke="#000" stroke-width="1"/>
  <rect x="410" y="240" width="30" height="50" fill="#4682B4" stroke="#000" stroke-width="1"/>
  <rect x="470" y="240" width="30" height="50" fill="#4682B4" stroke="#000" stroke-width="1"/>
  <rect x="530" y="240" width="30" height="50" fill="#4682B4" stroke="#000" stroke-width="1"/>
  
  <!-- Palace Windows - Second Floor -->
  <rect x="230" y="320" width="30" height="50" fill="#4682B4" stroke="#000" stroke-width="1"/>
  <rect x="290" y="320" width="30" height="50" fill="#4682B4" stroke="#000" stroke-width="1"/>
  <rect x="350" y="320" width="30" height="50" fill="#4682B4" stroke="#000" stroke-width="1"/>
  <rect x="410" y="320" width="30" height="50" fill="#4682B4" stroke="#000" stroke-width="1"/>
  <rect x="470" y="320" width="30" height="50" fill="#4682B4" stroke="#000" stroke-width="1"/>
  <rect x="530" y="320" width="30" height="50" fill="#4682B4" stroke="#000" stroke-width="1"/>
  
  <!-- Palace Windows - Third Floor -->
  <rect x="230" y="400" width="30" height="50" fill="#4682B4" stroke="#000" stroke-width="1"/>
  <rect x="290" y="400" width="30" height="50" fill="#4682B4" stroke="#000" stroke-width="1"/>
  <rect x="350" y="400" width="30" height="50" fill="#4682B4" stroke="#000" stroke-width="1"/>
  <rect x="410" y="400" width="30" height="50" fill="#4682B4" stroke="#000" stroke-width="1"/>
  <rect x="470" y="400" width="30" height="50" fill="#4682B4" stroke="#000" stroke-width="1"/>
  <rect x="530" y="400" width="30" height="50" fill="#4682B4" stroke="#000" stroke-width="1"/>
  
  <!-- Main Entrance -->
  <rect x="370" y="420" width="60" height="80" fill="#8B4513"/>
  <path d="M370,420 Q400,380 430,420" fill="none" stroke="#DAA520" stroke-width="2"/>
  
  <!-- Palace Lights - illumination effect -->
  <circle cx="230" cy="220" r="3" fill="#FFFF00" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="290" cy="220" r="3" fill="#FFFF00" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="220" r="3" fill="#FFFF00" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="410" cy="220" r="3" fill="#FFFF00" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="470" cy="220" r="3" fill="#FFFF00" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="530" cy="220" r="3" fill="#FFFF00" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  
  <!-- More lights along the palace -->
  <circle cx="200" cy="300" r="3" fill="#FFFF00" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="370" r="3" fill="#FFFF00" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="440" r="3" fill="#FFFF00" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3.3s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="600" cy="300" r="3" fill="#FFFF00" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="370" r="3" fill="#FFFF00" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="440" r="3" fill="#FFFF00" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2.9s" repeatCount="indefinite"/>
  </circle>
  
  <!-- People silhouettes viewing illuminated palace -->
  <circle cx="280" cy="530" r="10" fill="#000"/>
  <rect x="277" y="540" width="6" height="20" fill="#000"/>
  <rect x="270" y="555" width="20" height="4" fill="#000"/>
  <rect x="277" y="565" width="6" height="15" fill="#000"/>
  
  <circle cx="350" cy="540" r="8" fill="#000"/>
  <rect x="348" y="548" width="4" height="15" fill="#000"/>
  <rect x="343" y="556" width="15" height="3" fill="#000"/>
  <rect x="348" y="563" width="4" height="10" fill="#000"/>
  
  <circle cx="520" cy="535" r="9" fill="#000"/>
  <rect x="518" y="544" width="5" height="18" fill="#000"/>
  <rect x="512" y="553" width="18" height="4" fill="#000"/>
  <rect x="518" y="562" width="5" height="13" fill="#000"/>
  
  <!-- Reflection in water -->
  <rect x="180" y="500" width="440" height="30" fill="#000033" opacity="0.5"/>
  <ellipse cx="400" cy="500" rx="220" ry="10" fill="#4169E1" opacity="0.3"/>
  
  <!-- Text - "MYSORE PALACE" -->
  <text x="310" y="580" font-family="Arial" font-size="24" font-weight="bold" fill="#FFD700">MYSORE PALACE</text>
</svg>