<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Background -->
  <rect width="800" height="600" fill="#f0f5fa"/>
  
  <!-- Sky -->
  <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#64b5f6" />
    <stop offset="100%" stop-color="#bbdefb" />
  </linearGradient>
  <rect width="800" height="350" fill="url(#sky)"/>
  
  <!-- Ground -->
  <rect x="0" y="350" width="800" height="250" fill="#8d6e63"/>
  
  <!-- Reflection Pool -->
  <rect x="250" y="350" width="300" height="200" fill="#29b6f6" opacity="0.7"/>
  
  <!-- Taj Mahal Main Building (Center Dome) -->
  <path d="M400,150 Q400,100 450,150 L450,300 L350,300 L350,150 Q350,100 400,150 Z" fill="white" stroke="#bdbdbd" stroke-width="1"/>
  <ellipse cx="400" cy="150" rx="50" ry="25" fill="white" stroke="#bdbdbd" stroke-width="1"/>
  <ellipse cx="400" cy="125" rx="10" ry="25" fill="white" stroke="#bdbdbd" stroke-width="1"/>
  
  <!-- Side Domes -->
  <path d="M300,175 Q300,150 325,175 L325,300 L275,300 L275,175 Q275,150 300,175 Z" fill="white" stroke="#bdbdbd" stroke-width="1"/>
  <ellipse cx="300" cy="175" rx="25" ry="15" fill="white" stroke="#bdbdbd" stroke-width="1"/>
  
  <path d="M500,175 Q500,150 525,175 L525,300 L475,300 L475,175 Q475,150 500,175 Z" fill="white" stroke="#bdbdbd" stroke-width="1"/>
  <ellipse cx="500" cy="175" rx="25" ry="15" fill="white" stroke="#bdbdbd" stroke-width="1"/>
  
  <!-- Minarets -->
  <rect x="200" y="200" width="25" height="150" fill="white" stroke="#bdbdbd" stroke-width="1"/>
  <ellipse cx="212.5" cy="200" rx="12.5" ry="7.5" fill="white" stroke="#bdbdbd" stroke-width="1"/>
  
  <rect x="575" y="200" width="25" height="150" fill="white" stroke="#bdbdbd" stroke-width="1"/>
  <ellipse cx="587.5" cy="200" rx="12.5" ry="7.5" fill="white" stroke="#bdbdbd" stroke-width="1"/>
  
  <!-- Base Platform -->
  <rect x="175" y="350" width="450" height="25" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="1"/>
  
  <!-- Steps -->
  <rect x="350" y="375" width="100" height="10" fill="#f5f5f5"/>
  <rect x="325" y="385" width="150" height="10" fill="#eeeeee"/>
  <rect x="300" y="395" width="200" height="10" fill="#e0e0e0"/>
  
  <!-- Reflection -->
  <path d="M400,350 Q400,400 450,350 L450,500 L350,500 L350,350 Q350,400 400,350 Z" fill="white" opacity="0.3"/>
  <ellipse cx="400" cy="350" rx="50" ry="25" fill="white" opacity="0.3"/>
  
  <!-- Decorative Text -->
  <text x="400" y="550" text-anchor="middle" font-family="Arial" font-size="20" fill="#5d4037">Taj Mahal, Agra</text>
</svg>