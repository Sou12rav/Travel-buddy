<?xml version="1.0" encoding="UTF-8"?>
<svg width="200px" height="200px" viewBox="0 0 200 200" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
    <g transform="translate(10, 20)">
      <!-- Base -->
      <rect x="20" y="160" width="140" height="10" fill="#ddd"/>
      
      <!-- Main structure -->
      <rect x="30" y="120" width="120" height="40" fill="#f5f5f5"/>
      
      <!-- Main dome -->
      <path d="M90,40 Q180,90 150,120 L30,120 Q0,90 90,40 Z" fill="#f5f5f5"/>
      <ellipse cx="90" cy="40" rx="15" ry="8" fill="#f5f5f5"/>
      <path d="M90,30 L90,15 Q95,10 100,15 L100,20 Z" fill="#f5f5f5"/>
      
      <!-- Small domes -->
      <path d="M45,75 Q60,90 50,120 L35,120 Q25,90 45,75 Z" fill="#f5f5f5"/>
      <ellipse cx="45" cy="75" rx="5" ry="3" fill="#f5f5f5"/>
      
      <path d="M135,75 Q155,90 145,120 L130,120 Q120,90 135,75 Z" fill="#f5f5f5"/>
      <ellipse cx="135" cy="75" rx="5" ry="3" fill="#f5f5f5"/>
      
      <!-- Archways -->
      <path d="M65,120 L65,90 Q90,75 115,90 L115,120 Z" fill="#f0f0f0"/>
      <path d="M70,120 L70,95 Q90,83 110,95 L110,120 Z" fill="#e0e0e0"/>
      
      <!-- Small details -->
      <path d="M50,120 L50,110 L55,110 L55,120 Z" fill="#e0e0e0"/>
      <path d="M125,120 L125,110 L130,110 L130,120 Z" fill="#e0e0e0"/>
      
      <!-- Reflection pool -->
      <rect x="60" y="140" width="60" height="5" fill="#a0d8ef"/>
    </g>
  </g>
</svg>